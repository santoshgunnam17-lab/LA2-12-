<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Portal</title>

    <style>
        body {
            background-color: skyblue;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        /* Navigation */
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav a {
            background-color: darkblue;
            color: white;
            padding: 10px 15px;
            margin: 5px;
            text-decoration: none;
            border-radius: 5px;
        }

        .nav a:hover {
            background-color: navy;
        }

        /* Sections */
        .section {
            background-color: darkblue;
            color: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: white;
            color: darkblue;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: lightgray;
        }
    </style>

    <script>
        function showMessage() {
            alert("Form Submitted Successfully");
        }
    </script>
</head>

<body>

    <h1>Student Registration Portal</h1>

    <!-- Navigation -->
    <div class="nav">
        <a href="#personal">Personal Information</a>
        <a href="#academic">Academic Details</a>
        <a href="#address">Address Information</a>
        <a href="#account">Account Credentials</a>
    </div>

    <form onsubmit="showMessage()">

        <!-- Section 1 -->
        <div id="personal" class="section">
            <h2>Personal Information</h2>

            <label>Full Name</label>
            <input type="text">

            <label>Date of Birth</label>
            <input type="date">

            <label>Gender</label>
            <select>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Email Address</label>
            <input type="email">

            <label>Mobile Number</label>
            <input type="text">
        </div>

        <!-- Section 2 -->
        <div id="academic" class="section">
            <h2>Academic Details</h2>

            <label>Register Number</label>
            <input type="text">

            <label>Degree Program</label>
            <input type="text">

            <label>Department</label>
            <input type="text">

            <label>Year of Study</label>
            <input type="text">
        </div>

        <!-- Section 3 -->
        <div id="address" class="section">
            <h2>Address Information</h2>

            <label>Door Number</label>
            <input type="text">

            <label>Street Name</label>
            <input type="text">

            <label>City</label>
            <input type="text">

            <label>State</label>
            <input type="text">

            <label>Pincode</label>
            <input type="text">
        </div>

        <!-- Section 4 -->
        <div id="account" class="section">
            <h2>Account Credentials</h2>

            <label>Username</label>
            <input type="text">

            <label>Password</label>
            <input type="password">

            <label>Confirm Password</label>
            <input type="password">

            <br><br>
            <button type="submit">Submit</button>
        </div>

    </form>
    <p><b>Name: G.V S N Santosh<br>Reg no: 24BCT0297</b></p>

</body>
</html>
